name: GitOps Update Pipeline

on:
  push:
    branches: ["main"]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Force update (GitOps trigger)
        run: |
          echo "# change $(date)" >> k8s/deployment.yaml

      - name: Commit change
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Auto update trigger" || echo "No changes"
          git push
